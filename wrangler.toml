"$schema" = "./node_modules/wrangler/config-schema.json"
name = "codex-app-remotely-remote"
main = "worker/index.js"
compatibility_date = "2026-05-04"

[[durable_objects.bindings]]
name = "REMOTE_SESSIONS"
class_name = "RemoteSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = [ "RemoteSession" ]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = [ "/ws/*", "/api/*" ]
