<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Remote Control</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div id="subtitle" class="subtitle">Connecting</div>
      <div class="topbar-actions">
        <select id="qualitySelect" class="quality-select" aria-label="Quality">
          <option value="auto">Auto</option>
          <option value="good">Quality</option>
          <option value="medium">Smooth</option>
          <option value="bad">Saver</option>
        </select>
        <button id="refreshButton" class="icon-button" type="button" title="Refresh screenshot">↻</button>
      </div>
    </header>

    <main class="viewport">
      <div id="screenWrap" class="screen-wrap">
        <canvas id="screen" class="screen" aria-label="Codex app screen" hidden></canvas>
        <div id="emptyState" class="empty-state">Waiting for CDP screencast</div>
      </div>
    </main>

    <textarea
      id="keyboardProxy"
      class="keyboard-proxy"
      aria-label="Keyboard input proxy"
      autocomplete="off"
      autocapitalize="none"
      spellcheck="false"
      inputmode="text"
    ></textarea>

    <script src="app.js" type="module"></script>
  </body>
</html>
