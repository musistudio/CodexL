name: Release Desktop App

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
            rustTargets: aarch64-apple-darwin
          - label: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin
            rustTargets: x86_64-apple-darwin
          - label: Windows x64
            platform: windows-latest
            args: ""
            rustTargets: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release_tag
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$GITHUB_REF_NAME"
          fi
          TAG="${TAG#refs/tags/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Validate release version
        shell: bash
        run: node scripts/verify-release-version.mjs "${{ steps.release_tag.outputs.tag }}"

      - name: Check updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::Set the TAURI_SIGNING_PRIVATE_KEY repository secret. It must match the public key configured in src-tauri/tauri.conf.json."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Package built-in plugins
        run: pnpm run package:builtin-plugins

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.release_tag.outputs.tag }}
          releaseName: CodexL ${{ steps.release_tag.outputs.tag }}
          releaseBody: |
            Desktop installers for CodexL.

            The generated `latest.json` asset is used by the in-app updater.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: ${{ contains(steps.release_tag.outputs.tag, '-') }}
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true
          releaseAssetNamePattern: "[name]-[version]-[platform]-[arch][setup][ext]"
